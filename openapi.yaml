openapi: 3.0.3
info:
  title: Video Upload Platform API
  description: |
    视频上传平台 REST API，支持分片上传、断点续传、角色权限控制。
    
    **认证方式**：Bearer JWT Token  
    **Base URL**：`http://42.121.167.205`
    
    **角色说明**：
    - `viewer`：浏览和观看已就绪视频
    - `uploader`：上传、管理自己的视频
    - `admin`：管理所有用户和视频
  version: "1.0.0"

servers:
  - url: http://42.121.167.205
    description: Production Server

tags:
  - name: auth
    description: 用户认证与授权
  - name: upload
    description: 视频分片上传
  - name: videos
    description: 视频管理
  - name: admin
    description: 管理员接口
  - name: system
    description: 系统接口

paths:
  /health:
    get:
      tags: [system]
      summary: 健康检查
      operationId: healthCheck
      responses:
        "200":
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/register:
    post:
      tags: [auth]
      summary: 注册新用户
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: user@example.com
              password: password123
              role: viewer
      responses:
        "201":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          description: 邮箱已注册 / 参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: Email already registered
        "429":
          description: 请求过于频繁（10次/分钟限制）

  /auth/login:
    post:
      tags: [auth]
      summary: 用户登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: admin@test.com
              password: admin123!
      responses:
        "200":
          description: 登录成功，返回 JWT Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: 邮箱或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: Incorrect email or password
        "403":
          description: 账号已禁用
        "429":
          description: 请求过于频繁

  /auth/logout:
    post:
      tags: [auth]
      summary: 登出
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "204":
          description: 登出成功
        "401":
          description: Token 无效或缺失

  /videos:
    get:
      tags: [videos]
      summary: 获取视频列表
      description: |
        按角色过滤：
        - `uploader`：只返回自己上传的视频
        - `viewer`：只返回状态为 ready 的视频
        - `admin`：返回所有视频
      operationId: listVideos
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: 视频列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoListResponse"
        "401":
          description: 未认证

  /videos/{video_id}:
    get:
      tags: [videos]
      summary: 获取视频详情及预签名 URL
      description: |
        状态为 ready 的视频会返回有效期 1 小时的 OSS 预签名播放链接。
        viewer 只能访问 ready 状态视频；uploader 只能访问自己的视频。
      operationId: getVideo
      security:
        - bearerAuth: []
      parameters:
        - name: video_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 视频详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResponse"
        "401":
          description: 未认证
        "403":
          description: 无权限访问
        "404":
          description: 视频不存在或已删除

    delete:
      tags: [videos]
      summary: 软删除视频
      description: |
        将视频标记为已删除，不立即从 OSS 移除。
        同时递减上传者的 storage_used 计数。
        uploader 只能删除自己的视频；admin 可删除任意视频；viewer 无删除权限。
      operationId: deleteVideo
      security:
        - bearerAuth: []
      parameters:
        - name: video_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 删除成功
        "401":
          description: 未认证
        "403":
          description: 无权限
        "404":
          description: 视频不存在

  /videos/upload/init:
    post:
      tags: [upload]
      summary: 初始化分片上传
      description: |
        创建上传会话，服务端自动计算 chunk_size（保证分片数 ≤ 9000，支持 TB 级文件）。
        返回 session_id 用于后续分片上传。
      operationId: initUpload
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitUploadRequest"
            example:
              title: My Video
              description: A test video
              filename: video.mp4
              file_size: 104857600
              content_type: video/mp4
      responses:
        "201":
          description: 上传会话创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitUploadResponse"
        "400":
          description: 文件格式/大小不合法
        "401":
          description: 未认证
        "403":
          description: 需要 uploader 或 admin 角色

  /videos/upload/{session_id}/chunk:
    put:
      tags: [upload]
      summary: 上传单个分片
      description: |
        请求体为原始二进制数据（Content-Type: application/octet-stream）。
        接口幂等：已上传的分片重复上传会直接跳过。
        返回当前上传进度百分比。
      operationId: uploadChunk
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: chunk_number
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: 分片序号，从 1 开始
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: 分片上传成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkUploadResponse"
        "400":
          description: 分片序号越界 / 空请求体
        "401":
          description: 未认证
        "403":
          description: 非本人上传会话
        "404":
          description: 会话不存在
        "409":
          description: 会话状态不允许上传（已完成/已中止）

  /videos/upload/{session_id}/complete:
    post:
      tags: [upload]
      summary: 完成分片上传
      description: |
        合并所有分片，完成 OSS Multipart Upload。
        所有分片必须已上传，否则返回 400 并列出缺失的分片编号。
        完成后视频状态变为 processing，storage_used 递增。
      operationId: completeUpload
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 上传完成
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteUploadResponse"
        "400":
          description: 存在未上传的分片
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: "Chunks not yet uploaded: [3, 7, 12]"
        "401":
          description: 未认证
        "403":
          description: 非本人上传会话
        "502":
          description: OSS 合并失败

  /videos/upload/{session_id}/abort:
    delete:
      tags: [upload]
      summary: 取消上传
      description: |
        中止 OSS Multipart Upload，清理临时数据。
        会话状态置为 aborted，视频状态置为 failed。
      operationId: abortUpload
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 取消成功
        "401":
          description: 未认证
        "403":
          description: 非本人上传会话
        "404":
          description: 会话不存在

  /admin/users:
    get:
      tags: [admin]
      summary: 获取所有用户列表
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: 用户列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserAdmin"
                  total:
                    type: integer
                  page:
                    type: integer
                  size:
                    type: integer
        "401":
          description: 未认证
        "403":
          description: 需要 admin 角色

  /admin/users/{user_id}/role:
    patch:
      tags: [admin]
      summary: 修改用户角色
      operationId: updateUserRole
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [viewer, uploader, admin]
            example:
              role: uploader
      responses:
        "200":
          description: 角色修改成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          description: 无效角色值
        "401":
          description: 未认证
        "403":
          description: 需要 admin 角色
        "404":
          description: 用户不存在

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [viewer, uploader, admin]
          default: viewer

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UserPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [viewer, uploader, admin]
        storage_used:
          type: integer
          description: 已用存储空间（字节）
        created_at:
          type: string
          format: date-time

    UserAdmin:
      allOf:
        - $ref: "#/components/schemas/UserPublic"
        - type: object
          properties:
            is_active:
              type: boolean

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          description: Token 有效期（秒）
        user:
          $ref: "#/components/schemas/UserPublic"

    InitUploadRequest:
      type: object
      required: [title, filename, file_size, content_type]
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        filename:
          type: string
          description: 文件名，扩展名须为 .mp4/.mov/.avi/.mkv
        file_size:
          type: integer
          description: 文件总大小（字节）
        content_type:
          type: string
          enum:
            - video/mp4
            - video/quicktime
            - video/x-msvideo
            - video/x-matroska
            - video/webm
        chunk_size:
          type: integer
          nullable: true
          description: 客户端期望的分片大小（字节），服务端会自动调整

    InitUploadResponse:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
        video_id:
          type: string
          format: uuid
        oss_key:
          type: string
        chunk_size:
          type: integer
          description: 服务端最终确定的分片大小（字节）
        total_chunks:
          type: integer
        uploaded_chunks:
          type: array
          items:
            type: integer
          description: 已上传的分片编号列表（断点续传用）

    ChunkUploadResponse:
      type: object
      properties:
        chunk_number:
          type: integer
        uploaded_chunks:
          type: integer
          description: 已上传分片数
        total_chunks:
          type: integer
        progress:
          type: number
          format: float
          description: 上传进度 0.0 ~ 100.0

    CompleteUploadResponse:
      type: object
      properties:
        video_id:
          type: string
          format: uuid
        status:
          type: string
          example: processing
        message:
          type: string

    UploaderInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string

    VideoResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        uploader:
          $ref: "#/components/schemas/UploaderInfo"
        file_size:
          type: integer
        content_type:
          type: string
        status:
          type: string
          enum: [uploading, processing, ready, failed, deleted]
        view_count:
          type: integer
        created_at:
          type: string
          format: date-time
        presigned_url:
          type: string
          nullable: true
          description: OSS 预签名播放链接（仅单视频详情接口返回，有效期 1 小时）

    VideoListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/VideoResponse"
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer
        pages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
